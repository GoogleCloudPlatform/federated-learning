---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nvflare-server
  labels:
    run: nvflare-server
spec:
  replicas: 1
  selector:
    matchLabels:
      run: nvflare-server
  template:
    metadata:
      labels:
        run: nvflare-server
      annotations:
        gke-gcsfuse/volumes: "true"
    spec:
      containers:
        - name: nvflare
          image: nvflare-tensorflow
          imagePullPolicy: Always
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          command:
            - /usr/local/bin/python3
          args:
            - -u
            - -m
            - nvflare.private.fed.app.server.server_train
            - -m
            - /workspace/nvfl/workspace/example_project/prod_00/server1
            - -s
            - fed_server.json
            - --set
            - secure_train=true
            - config_folder=config
            - org=nvidia
          resources:
            requests:
              cpu: "1"
              memory: "1Gi"
            limits:
              cpu: "1"
              memory: "1Gi"
          volumeMounts:
            - name: nvfl
              mountPath: /workspace/nvfl/
      volumes:
        - name: nvfl
          persistentVolumeClaim:
            claimName: nvflare-pv-claim
      securityContext:
        fsGroup: 1000
...
